inbounds:
  socks:
    enabled: true
    listen: "127.0.0.1:1080"

  tun:
    enabled: true
    name: "shroud0"
    address: "10.10.0.2/24"
    mtu: 1400
    auto_route: false
    dns: "10.10.0.53"

outbound:
  server: "127.0.0.1"
  port: 8443
  path: "/api/tunnel"
  tls: true
  tls_server_name: "localhost"
  tls_ca_cert_path: "certs/ca.crt"

auth:
  client_id: "11111111-1111-1111-1111-111111111111"
  client_secret: "replace-with-random-secret"

dns:
  remote_by_default: true
  warn_on_ip_targets: true
  block_ip_targets: false

routing:
  default: "proxy"
  rules:
    - action: "direct"
      domain: "localhost"
    - action: "direct"
      domain_suffix: ".local"
    - action: "direct"
      cidr: "127.0.0.0/8"
    - action: "direct"
      port: 22
