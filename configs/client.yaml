inbounds:
  socks:
    enabled: true
    listen: "127.0.0.1:1080"

  tun:
    enabled: false
    name: "shroud0"
    address: "10.10.0.2/24"
    mtu: 1400
    auto_route: false
    dns: "10.10.0.53"

outbound:
  server: "127.0.0.1"
  port: 8443
  path: "/api/tunnel"
  tls: true
  tls_server_name: "localhost"
  tls_ca_cert_path: "certs/ca.crt"
  multiplex: true
  multiplex_tunnels: 4
  max_streams_per_tunnel: 16

auth:
  client_id: "c1ce8312-7c35-4e70-867a-3af4ac7f68d7"
  client_secret: "8ow8KFQbQ9KOuzhBxVnyROUaOMJx2km2jK4qjS7jVSM"

dns:
  remote_by_default: true
  warn_on_ip_targets: true
  block_ip_targets: false

routing:
  default: "proxy"
  rules:
    - action: "direct"
      domain: "localhost"
    - action: "direct"
      domain_suffix: ".local"
    - action: "direct"
      cidr: "127.0.0.0/8"
    - action: "direct"
      port: 22
